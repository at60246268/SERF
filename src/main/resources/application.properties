# Configuración de la aplicación SERF
spring.application.name=SERF - Sistema Empresarial de Gestión de Reportes Financieros

# Puerto del servidor
server.port=8081

# Configuración de H2 Database
spring.datasource.url=jdbc:h2:mem:serfdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# H2 Console (Acceso a base de datos)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.financorp.serf=DEBUG
logging.level.org.springframework.web=INFO

# Formato de fecha
spring.mvc.format.date=yyyy-MM-dd

# Mensajes de validación en español
spring.messages.basename=messages
spring.messages.encoding=UTF-8
