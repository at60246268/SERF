<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout}">
<head>
    <title th:text="${producto.id == null ? 'Nuevo Producto' : 'Editar Producto'} + ' - SERF'">Producto - SERF</title>
</head>
<body>
    <th:block th:fragment="content">
        <div class="row mb-4">
            <div class="col">
                <h1>
                    <i class="bi bi-box-seam"></i> 
                    <span th:text="${producto.id == null ? 'Nuevo Producto' : 'Editar Producto'}"></span>
                </h1>
            </div>
            <div class="col-auto">
                <a href="/productos" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
            </div>
        </div>
        
        <div class="card">
            <div class="card-body">
                <form th:action="@{/productos}" th:object="${producto}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Código del Producto *</label>
                            <input type="text" class="form-control" th:field="*{codigo}" required 
                                   placeholder="Ej: PROD-001">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Categoría *</label>
                            <select class="form-select" th:field="*{categoria}" required>
                                <option value="">Seleccione...</option>
                                <option th:each="cat : ${categorias}" 
                                        th:value="${cat}" 
                                        th:text="${cat.descripcion}"></option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Nombre del Producto *</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required
                               placeholder="Ej: Laptop Dell XPS 15">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Descripción Técnica</label>
                        <textarea class="form-control" th:field="*{descripcionTecnica}" rows="3"
                                  placeholder="Especificaciones técnicas del producto..."></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Costo de Importación *</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{costoImportacion}" required>
                        </div>
                        
                        <div class="col-md-2 mb-3">
                            <label class="form-label">Moneda *</label>
                            <select class="form-select" th:field="*{monedaImportacion}" required>
                                <option th:each="mon : ${monedas}" 
                                        th:value="${mon}" 
                                        th:text="${mon.codigo}"></option>
                            </select>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Precio de Venta *</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{precioVenta}" required>
                        </div>
                        
                        <div class="col-md-2 mb-3">
                            <label class="form-label">Moneda *</label>
                            <select class="form-select" th:field="*{monedaVenta}" required>
                                <option th:each="mon : ${monedas}" 
                                        th:value="${mon}" 
                                        th:text="${mon.codigo}"></option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Proveedor</label>
                            <select class="form-select" th:field="*{proveedor}">
                                <option value="">Seleccione...</option>
                                <option th:each="prov : ${proveedores}" 
                                        th:value="${prov.id}" 
                                        th:text="${prov.nombre}"></option>
                            </select>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Fecha de Importación *</label>
                            <input type="date" class="form-control" th:field="*{fechaImportacion}" required>
                        </div>
                        
                        <div class="col-md-2 mb-3">
                            <label class="form-label">Stock Actual *</label>
                            <input type="number" class="form-control" th:field="*{stockActual}" required>
                        </div>
                        
                        <div class="col-md-2 mb-3">
                            <label class="form-label">Stock Mínimo *</label>
                            <input type="number" class="form-control" th:field="*{stockMinimo}" required>
                        </div>
                    </div>
                    
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> 
                        <strong>Conversión Automática:</strong> El sistema convertirá automáticamente el precio a EUR (moneda corporativa) 
                        usando el <strong>patrón Singleton</strong> (ConfiguracionGlobal).
                    </div>
                    
                    <div class="text-end">
                        <a href="/productos" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Guardar Producto
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </th:block>
</body>
</html>
