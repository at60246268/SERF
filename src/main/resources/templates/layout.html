<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERF - Sistema Empresarial de Reportes Financieros</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Tema Profesional Único -->
    <link rel="stylesheet" th:href="@{/css/styles-unified.css}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-bar-chart-line-fill"></i> SERF - FinanCorp S.A.
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="bi bi-house-fill"></i> Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/productos}">
                            <i class="bi bi-box-seam"></i> Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/ventas}">
                            <i class="bi bi-cart-check"></i> Ventas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/reportes}">
                            <i class="bi bi-file-bar-graph"></i> Reportes
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Alertas -->
    <div class="container mt-3">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>
    
    <!-- Contenido principal -->
    <main class="container my-4">
        <th:block th:include="this :: content"></th:block>
    </main>
    
    <!-- Footer -->
    <footer class="footer py-4">
        <div class="container text-center">
            <p class="mb-0"><strong>© 2026 FinanCorp S.A.</strong> - Sistema Empresarial de Gestión de Reportes Financieros (SERF)</p>
            <small class="text-muted">
                Desarrollado con patrones de diseño: Singleton, Prototype, Builder, Composite, Decorator, Facade<br>
                Aplicando principios SOLID
            </small>
        </div>
    </footer>
    
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
