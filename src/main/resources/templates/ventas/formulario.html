<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout}">
<head>
    <title>Nueva Venta - SERF</title>
</head>
<body>
    <th:block th:fragment="content">
        <div class="row mb-4">
            <div class="col">
                <h1><i class="bi bi-cart-check"></i> Registrar Nueva Venta</h1>
            </div>
            <div class="col-auto">
                <a href="/ventas" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
            </div>
        </div>
        
        <div class="card">
            <div class="card-body">
                <form th:action="@{/ventas}" th:object="${venta}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Número de Factura *</label>
                            <input type="text" class="form-control" th:field="*{numeroFactura}" required
                                   placeholder="Ej: FAC-2024-001">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha de Venta *</label>
                            <input type="date" class="form-control" th:field="*{fechaVenta}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Cliente *</label>
                            <select class="form-select" th:field="*{cliente}" required>
                                <option value="">Seleccione un cliente...</option>
                                <option th:each="cliente : ${clientes}" 
                                        th:value="${cliente.id}" 
                                        th:text="${cliente.nombre} + ' - ' + ${cliente.email}"></option>
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Filial de Venta *</label>
                            <select class="form-select" th:field="*{filial}" required>
                                <option value="">Seleccione una filial...</option>
                                <option th:each="filial : ${filiales}" 
                                        th:value="${filial.id}" 
                                        th:text="${filial.pais} + ' - ' + ${filial.ciudad}"></option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Producto *</label>
                            <select class="form-select" th:field="*{producto}" required id="productoSelect">
                                <option value="">Seleccione un producto...</option>
                                <option th:each="producto : ${productos}" 
                                        th:value="${producto.id}"
                                        th:attr="data-precio=${producto.precioVenta}, data-stock=${producto.stockActual}"
                                        th:text="${producto.codigo} + ' - ' + ${producto.nombre} + ' (Stock: ' + ${producto.stockActual} + ')'"></option>
                            </select>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Cantidad *</label>
                            <input type="number" class="form-control" th:field="*{cantidad}" required min="1" id="cantidadInput">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Precio Unitario *</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{precioUnitario}" required>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Descuento (%)</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{descuento}" value="0">
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Método de Pago *</label>
                            <select class="form-select" th:field="*{metodoPago}" required>
                                <option value="">Seleccione...</option>
                                <option th:each="metodo : ${metodosPago}" 
                                        th:value="${metodo}" 
                                        th:text="${metodo.descripcion}"></option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Observaciones</label>
                        <textarea class="form-control" th:field="*{observaciones}" rows="2"
                                  placeholder="Comentarios adicionales sobre la venta..."></textarea>
                    </div>
                    
                    <div class="alert alert-info">
                        <h6><i class="bi bi-info-circle"></i> Cálculos Automáticos</h6>
                        <ul class="mb-0">
                            <li>El <strong>monto total</strong> se calcula: (Precio Unitario × Cantidad) - Descuento</li>
                            <li>La <strong>conversión a EUR</strong> se realiza automáticamente usando el <strong>patrón Singleton</strong></li>
                            <li>El <strong>stock</strong> se reduce automáticamente al confirmar la venta</li>
                        </ul>
                    </div>
                    
                    <div class="text-end">
                        <a href="/ventas" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Registrar Venta
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </th:block>
</body>
</html>
